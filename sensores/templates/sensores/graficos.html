<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gráfico de Sensores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .grid-graficos {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colunas iguais. Tem que testar pra ver e funciona*/
            gap: 20px;
            width: 100%; /* ocupa toda a largura */
        }

        canvas {
            width: 100% !important;
            height: 450px !important;
            background: #ffffff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
          form, a {
              display: inline-block;
              margin: 10px 5px;
          }

          button {
              background-color: #4a90e2;
              color: white;
              border: none;
              padding: 8px 16px;
              border-radius: 5px;
              cursor: pointer;
              font-size: 14px;
              transition: background-color 0.2s ease;
          }

          button:hover {
              background-color: #357abd;
          }

          table {
              width: 100%;
              max-width: 1200px;
              margin: 20px auto;
              border-collapse: collapse;
              background: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 2px 8px rgba(0,0,0,0.1);
          }

          th, td {
              padding: 8px;
              text-align: center;
          }

          th {
              background-color: #4a90e2;
              color: white;
          }

          tr:nth-child(even) {
              background-color: #f2f2f2;
          }
    </style>
</head>
<body>

<h1>Série Histórica dos Sensores</h1>

<div style="text-align:center;">
   
    <a href="/">
        <button type="button">Home</button>
    </a>
    
    <a href="/graficos/">
        <button type="button">Gráficos</button>
    </a>
    
    <form method="post" action="/logout/">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>

</div>

<div class="grid-graficos">
    <canvas id="grafico1"></canvas>
    <canvas id="grafico2"></canvas>
    <canvas id="grafico3"></canvas>
    <canvas id="grafico4"></canvas>
    <canvas id="grafico5"></canvas>
    <canvas id="grafico6"></canvas>
</div>

<script>
    const ids = {{ ids|safe }};
    
    function criarGrafico(canvasId, dados, label) {
        new Chart(document.getElementById(canvasId), {
            type: 'bar',
            data: {
                labels: ids,
                datasets: [{
                    label: label,
                    data: dados,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    criarGrafico("grafico1", {{ sensor_1|safe }}, "Sensor 1");
    criarGrafico("grafico2", {{ sensor_2|safe }}, "Sensor 2");
    criarGrafico("grafico3", {{ sensor_3|safe }}, "Sensor 3");
    criarGrafico("grafico4", {{ sensor_4|safe }}, "Sensor 4");
    criarGrafico("grafico5", {{ sensor_5|safe }}, "Sensor 5");
    criarGrafico("grafico6", {{ sensor_6|safe }}, "Sensor 6");
</script>

</body>
</html>
